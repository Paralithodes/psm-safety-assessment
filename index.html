<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PSM 안전수준 평가</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="app-header">
  <div class="brand">
    <img class="brand-mark" src="logo.jpg" alt="CGN 씨지앤대산전력" />
    <div class="app-title">
      <h1>PSM 안전수준 평가</h1>
      <span class="app-subtitle">공정안전관리(PSM) 12대 요소 - 수준평가 · 요소별 학습</span>
    </div>
  </div>
  <button class="admin-link" id="btn-admin-entry">🔐 관리자</button>
</header>

<div class="mode-bar" id="mode-bar"></div>

<div class="progress-bar-wrap" id="progress-bar-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <span class="progress-text" id="progress-text"></span>
</div>

<div class="app-body">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

<footer class="app-footer">
  ※ 문항 데이터는 <code>questions_data.xlsx</code> 수정 후 <code>문제은행_업데이트.bat</code> 실행으로 갱신됩니다. 입력 내용은 브라우저(localStorage)에 자동 저장됩니다.
</footer>

<script src="questions.js"></script>
<script src="app.js"></script>
</body>
</html>
